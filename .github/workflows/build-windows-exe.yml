name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      publish_to_repo:
        description: "Commit releases/windows/Touracle back to the repo (requires contents:write)"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths-ignore:
      - 'releases/windows/**'
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install + build
        shell: pwsh
        run: |
          ./project/packaging/build_windows_exe.ps1 -Name Touracle

      - name: Publish build to repo
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.publish_to_repo) || (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && github.actor != 'github-actions') }}
        shell: pwsh
        run: |
          git lfs install
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git add releases/windows/Touracle
          git commit -m "Update Windows bundle (releases/windows)" || exit 0
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Touracle-windows
          path: releases/windows/Touracle/
          if-no-files-found: error
